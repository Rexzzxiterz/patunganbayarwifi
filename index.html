<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Spinner Game</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
  <h1>🎡 Spinner Game</h1>

  <div class="wheel-container">
    <div class="pointer"></div>
    <div class="wheel" id="wheel">
      <div class="segment">100</div>
      <div class="segment">200</div>
      <div class="segment">LOSE</div>
      <div class="segment">500</div>
      <div class="segment">1000</div>
      <div class="segment">TRY</div>
    </div>
  </div>

  <button id="spinBtn">SPIN</button>

  <h2 id="result">Tekan Spin</h2>
</div>

<script src="script.js"></script>
</body>
</html>
