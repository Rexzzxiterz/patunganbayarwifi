<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dino Runner PRO</title>

  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="game">

  <!-- HUD -->
  <div class="top-ui">

    <div class="logo">
      NO INTERNET
    </div>

    <div class="score-box">
      <div id="score">00000</div>
      <div id="high">HI 00000</div>
    </div>

  </div>

  <!-- START PANEL -->
  <div class="start-panel" id="startPanel">

    <h1>
      TEKAN SPASI / TAP UNTUK BERMAIN
    </h1>

    <div class="controls">

      <div class="control-box">
        SPACE
      </div>

      <span>LOMPAT</span>

    </div>

    <div class="controls">

      <div class="control-box">
        TAP
      </div>

      <span>HP CONTROL</span>

    </div>

  </div>

  <!-- GAME -->
  <div class="ground"></div>

  <div id="dino"></div>

  <div id="cactus"></div>

  <!-- GAME OVER -->
  <div class="game-over" id="gameover">

    GAME OVER

    <button id="restart">
      RESTART
    </button>

  </div>

</div>

<script src="script.js"></script>

</body>
</html>
