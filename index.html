<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dino Runner PRO</title>

<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="game">

<!-- Bintang -->
<div class="bg-stars"></div>

<!-- Bulan -->
<div class="moon"></div>

<!-- Judul -->
<div class="title">
NO INTERNET
</div>

<!-- Score -->
<div class="score" id="score">
00000
</div>

<!-- High Score -->
<div class="score" id="high">
HI 00000
</div>

<!-- Info -->
<div class="info" id="info">
TEKAN SPASI / TAP
</div>

<!-- Game Over -->
<div class="game-over" id="gameover">
GAME OVER
</div>

<!-- Restart -->
<button class="restart" id="restart">
RESTART
</button>

<!-- Tanah -->
<div class="ground"></div>

<!-- Dino -->
<div id="dino"></div>

<!-- Kaktus -->
<div id="cactus"></div>

</div>

<script src="script.js"></script>

</body>
</html>
