<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>ULTRA GOLD AI</title>

<script src="https://cdn.tailwindcss.com"></script>

<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Space Grotesk',sans-serif;
}

body{
background:#020617;
overflow:hidden;
color:white;
}

/* Animated Background */

.bg{
position:fixed;
width:100%;
height:100%;
background:
radial-gradient(circle at 10% 20%,rgba(255,215,0,0.18),transparent 20%),
radial-gradient(circle at 90% 80%,rgba(255,140,0,0.15),transparent 20%),
radial-gradient(circle at 50% 50%,rgba(255,255,255,0.03),transparent 40%),
#020617;
z-index:-10;
}

/* Grid Effect */

.grid{
position:absolute;
width:100%;
height:100%;
background-image:
linear-gradient(rgba(255,255,255,0.03) 1px, transparent 1px),
linear-gradient(90deg, rgba(255,255,255,0.03) 1px, transparent 1px);
background-size:40px 40px;
mask-image:radial-gradient(circle at center, black 40%, transparent 90%);
}

/* Floating Orbs */

.orb{
position:absolute;
border-radius:50%;
filter:blur(90px);
opacity:0.25;
animation:float 10s infinite alternate;
}

.orb1{
width:300px;
height:300px;
background:#FFD700;
top:-120px;
left:-120px;
}

.orb2{
width:350px;
height:350px;
background:#f59e0b;
bottom:-120px;
right:-120px;
animation-delay:2s;
}

@keyframes float{
from{
transform:translateY(0px) translateX(0px);
}
to{
transform:translateY(40px) translateX(30px);
}
}

/* Main Card */

.main{
width:100%;
max-width:460px;
position:relative;
z-index:5;
}

.card{
background:rgba(255,255,255,0.05);
backdrop-filter:blur(18px);
border:1px solid rgba(255,255,255,0.08);
box-shadow:
0 0 50px rgba(255,215,0,0.08),
inset 0 0 20px rgba(255,255,255,0.02);
}

/* Animated Border */

.border-glow{
position:absolute;
inset:0;
padding:1px;
border-radius:40px;
background:linear-gradient(
130deg,
rgba(255,215,0,0.8),
transparent,
rgba(255,215,0,0.8)
);
-webkit-mask:
linear-gradient(#fff 0 0) content-box,
linear-gradient(#fff 0 0);
-webkit-mask-composite:xor;
mask-composite:exclude;
animation:rotate 6s linear infinite;
}

@keyframes rotate{
from{
filter:hue-rotate(0deg);
}
to{
filter:hue-rotate(360deg);
}
}

/* Premium Text */

.gold{
background:linear-gradient(90deg,#FFD700,#fff6b7,#f59e0b);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
}

/* Inputs */

.input{
background:rgba(255,255,255,0.04);
border:1px solid rgba(255,215,0,0.1);
transition:0.4s;
}

.input:focus{
transform:translateY(-2px);
border-color:#FFD700;
box-shadow:0 0 20px rgba(255,215,0,0.2);
outline:none;
}

/* Buttons */

.gold-btn{
background:linear-gradient(135deg,#FFD700,#f59e0b);
color:black;
font-weight:bold;
transition:0.35s;
box-shadow:0 15px 30px rgba(255,215,0,0.2);
}

.gold-btn:hover{
transform:translateY(-4px) scale(1.02);
box-shadow:0 25px 40px rgba(255,215,0,0.35);
}

/* Floating Coins */

.coin{
position:absolute;
opacity:0.08;
animation:fall linear infinite;
}

@keyframes fall{
from{
transform:translateY(-150px) rotate(0deg);
}
to{
transform:translateY(120vh) rotate(360deg);
}
}

/* Live Dot */

.live{
width:10px;
height:10px;
background:#22c55e;
border-radius:50%;
animation:pulse 1.5s infinite;
}

@keyframes pulse{
0%{
box-shadow:0 0 0 0 rgba(34,197,94,0.7);
}
70%{
box-shadow:0 0 0 12px rgba(34,197,94,0);
}
100%{
box-shadow:0 0 0 0 rgba(34,197,94,0);
}
}

/* Shine */

.shine{
position:absolute;
top:0;
left:-100%;
width:50%;
height:100%;
background:linear-gradient(
90deg,
transparent,
rgba(255,255,255,0.15),
transparent
);
transform:skewX(-20deg);
animation:shine 4s infinite;
}

@keyframes shine{
0%{
left:-100%;
}
100%{
left:200%;
}
}

</style>
</head>

<body class="flex items-center justify-center min-h-screen px-5">

<div class="bg"></div>
<div class="grid"></div>

<div class="orb orb1"></div>
<div class="orb orb2"></div>

<script>

/* Floating Coins */

for(let i=0;i<25;i++){

const coin=document.createElement("div");

coin.className="coin";
coin.innerHTML="🪙";

coin.style.left=Math.random()*100+"vw";
coin.style.fontSize=(18+Math.random()*30)+"px";
coin.style.animationDuration=(6+Math.random()*12)+"s";

document.body.appendChild(coin);

}

</script>

<div class="main">

<div class="relative">

<div class="border-glow"></div>

<div class="card rounded-[40px] p-8 overflow-hidden relative">

<div class="shine"></div>

<!-- TOP -->

<div class="flex items-center justify-between mb-8">

<div class="flex items-center gap-3">

<div class="live"></div>

<div class="text-sm text-green-400">
AI Monitoring Active
</div>

</div>

<div class="text-yellow-300 text-sm">
24/7 Gold Tracker
</div>

</div>

<!-- HEADER -->

<div class="text-center mb-8">

<div class="text-7xl mb-4">
👑
</div>

<h1 class="text-5xl font-bold gold">
ULTRA GOLD
</h1>

<p class="text-gray-400 mt-4 leading-relaxed">
Platform pengingat beli emas digital<br>
dengan tampilan futuristik premium
</p>

</div>

<!-- FORM -->

<div class="space-y-5">

<div>

<label class="text-yellow-300 text-sm block mb-2">
🎯 Target Harga
</label>

<input
type="number"
id="targetPrice"
placeholder="Contoh: 1.500.000"
class="input w-full p-4 rounded-2xl text-white"
/>

</div>

<div>

<label class="text-yellow-300 text-sm block mb-2">
⏰ Waktu Reminder
</label>

<input
type="time"
id="reminderTime"
class="input w-full p-4 rounded-2xl text-white"
/>

</div>

<button
onclick="saveReminder()"
class="gold-btn w-full py-4 rounded-2xl text-lg"
>
AKTIFKAN AI REMINDER
</button>

<div
id="status"
class="text-center text-green-400 font-semibold"
></div>

</div>

<!-- STATUS -->

<div class="mt-8">

<div class="card rounded-3xl p-5">

<div class="flex items-center justify-between mb-5">

<div>

<h2 class="text-2xl font-bold gold">
Gold Status
</h2>

<p class="text-gray-500 text-sm">
Realtime monitoring system
</p>

</div>

<div class="text-4xl">
📈
</div>

</div>

<div class="space-y-4">

<div class="flex justify-between items-center">

<div class="text-gray-400">
Target Harga
</div>

<div
id="showPrice"
class="text-yellow-300 font-bold text-lg"
>
-
</div>

</div>

<div class="flex justify-between items-center">

<div class="text-gray-400">
Reminder
</div>

<div
id="showTime"
class="text-yellow-300 font-bold text-lg"
>
-
</div>

</div>

</div>

</div>

</div>

<!-- FOOTER -->

<div class="mt-8 text-center">

<div class="text-xs text-gray-600 tracking-[4px]">
ULTRAGOLD AI • FUTURE OF DIGITAL GOLD
</div>

</div>

</div>

</div>

</div>

<script>

function saveReminder(){

const price=document.getElementById("targetPrice").value;
const time=document.getElementById("reminderTime").value;

if(!price || !time){

alert("Lengkapi semua data!");
return;

}

localStorage.setItem("gold_price",price);
localStorage.setItem("gold_time",time);

document.getElementById("status").innerHTML=
"✅ AI Reminder berhasil diaktifkan";

loadReminder();

Notification.requestPermission();

}

/* Load */

function loadReminder(){

const price=localStorage.getItem("gold_price");
const time=localStorage.getItem("gold_time");

if(price){

document.getElementById("showPrice").innerHTML=
"Rp "+Number(price).toLocaleString("id-ID");

}

if(time){

document.getElementById("showTime").innerHTML=time;

}

}

/* Reminder Checker */

function checkReminder(){

const now=new Date();

const current=
String(now.getHours()).padStart(2,'0')+
":"+
String(now.getMinutes()).padStart(2,'0');

const reminder=localStorage.getItem("gold_time");
const price=localStorage.getItem("gold_price");

if(current===reminder){

showNotification(price);

}

}

/* Notification */

function showNotification(price){

if(Notification.permission==="granted"){

new Notification("👑 ULTRA GOLD ALERT",{

body:"Saatnya beli emas digital!\nHarga target: Rp "+Number(price).toLocaleString("id-ID"),

icon:"https://cdn-icons-png.flaticon.com/512/2933/2933116.png"

});

}

}

setInterval(checkReminder,30000);

loadReminder();

</script>

</body>
</html>
