<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Realtime Gold Trading</title>

<script src="https://cdn.tailwindcss.com"></script>

<style>

body{
background:#020617;
color:white;
font-family:Arial;
}

.card{
background:#0f172a;
border:1px solid #1e293b;
}

</style>

</head>

<body class="p-6">

<div class="max-w-7xl mx-auto">

<h1 class="text-5xl font-bold text-yellow-400 mb-3">
XAUUSD LIVE MARKET
</h1>

<p class="text-gray-400 mb-8">
Realtime Gold TradingView Chart
</p>

<div class="grid md:grid-cols-3 gap-6 mb-6">

<div class="card rounded-3xl p-6">

<div class="text-gray-400">
Market
</div>

<div class="text-3xl font-bold text-yellow-400 mt-3">
XAUUSD
</div>

</div>

<div class="card rounded-3xl p-6">

<div class="text-gray-400">
Source
</div>

<div class="text-3xl font-bold text-green-400 mt-3">
TRADINGVIEW
</div>

</div>

<div class="card rounded-3xl p-6">

<div class="text-gray-400">
Realtime
</div>

<div class="text-3xl font-bold text-blue-400 mt-3">
LIVE
</div>

</div>

</div>

<div class="card rounded-3xl overflow-hidden">

<!-- TradingView Widget BEGIN -->

<div class="tradingview-widget-container">

<div id="tradingview_chart"></div>

<script
type="text/javascript"
src="https://s3.tradingview.com/tv.js">
</script>

<script type="text/javascript">

new TradingView.widget({

"width": "100%",
"height": 700,

"symbol": "OANDA:XAUUSD",

"interval": "240",

"timezone": "Asia/Jakarta",

"theme": "dark",

"style": "1",

"locale": "id",

"toolbar_bg": "#0f172a",

"enable_publishing": false,

"hide_top_toolbar": false,

"hide_legend": false,

"save_image": true,

"container_id": "tradingview_chart"

});

</script>

</div>

<!-- TradingView Widget END -->

</div>

</div>

</body>
</html>
